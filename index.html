
<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leveo – Vardags AI</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
<meta name="theme-color" content="#2563eb">

</head>

<body>

<header>
<h1 id="appTitle">Leveo</h1>
<p id="tagline">Jag lättar. Jag hjälper.</p>
</header>

<nav class="nav">
<button onclick="setMode('support')">Stöd</button>
<button onclick="setMode('study')">Studier</button>
<button onclick="setMode('planning')">Planering</button>
<button onclick="setMode('food')">Mat</button>
<button onclick="setMode('training')">Träning</button>
<button onclick="setMode('economy')">Ekonomi</button>
</nav>

<div class="controls">
<button onclick="toggleLanguage()">🌍 Language</button>
<button onclick="startVoice()">🎤 Talk</button>
</div>

<div class="chat-container">
<div id="chat"></div>

<div class="input-box">
<input id="userInput" placeholder="Fråga Leveo...">
<button onclick="sendMessage()">Skicka</button>
</div>
</div>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
 navigator.serviceWorker.register('service-worker.js')
}
</script>

</body>
</html>
